version: "3.9"

name: vikki

networks:
  vikki_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:

services:

  postgres:
    image: postgres:16.2-alpine
    container_name: vikki_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - vikki_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0

  redis:
    image: redis:7.2-alpine
    container_name: vikki_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - vikki_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  minio:
    image: minio/minio:RELEASE.2024-12-13T00-00-00Z
    container_name: vikki_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - vikki_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: vikki_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
    networks:
      - vikki_net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  celery_worker:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: vikki_celery_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - vikki_net
    command: celery -A celery_app.celery worker --loglevel=info
    mem_limit: 1g
    cpus: 1.0

  celery_beat:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: vikki_celery_beat
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - vikki_net
    command: celery -A celery_app.celery beat --loglevel=info
    mem_limit: 512m
    cpus: 0.5

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: vikki_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - vikki_net
    expose:
      - "3000"
    mem_limit: 512m
    cpus: 0.5

  caddy:
    image: caddy:2.9.1-alpine
    container_name: vikki_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    networks:
      - vikki_net
    mem_limit: 256m
    cpus: 0.5

volumes:
  caddy_data:
  caddy_config: